<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skillstest</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <main>
    <div class="container p-3 mb-3 mt-5 rounded"><h1>Member Sign-up</h1>
            <h6>Student Details</h6>
    <label for="name">Fullname:</label>
    <input type="text" id="name"placeholder="Enter your fullname here"><br>
    <h6>Ticket Selection(Price: Php 250.00 each)</h6>
    <label for ="ticketQTY">Ticket QTY:</label>
    <input type="number" value="0" min="0" id="ticketQTY"placeholder="Ticket quantity here"><br>
   </div>
    <div class="container p-3 mb-3 rounded">
    <h1>Payment Details</h1>
    <label for="subtotal">Subtotal:</label>
    <input type="text" id="subtotal" readonly><br>
    <label for="Adfee">Admin Fee</label>
    <input type="text" id="Adfee" value="Php 50.00" min="Php 50.00" readonly><br>
    <label for="total">Total:</label>
    <input type="text" id="total"readonly><br>
    <button type="button" class="btn btn-success w-30" onclick="calculateAndRegister()">Register</button>
    </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
